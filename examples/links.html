<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links, Blocks, and Float</title>
    <link rel="stylesheet" href="links.css">
</head>
<body>
    <!-- Links Section -->
    <h1>Links in Styling</h1> <p>Writing systems do not constitute human languages themselves—they are a means of rendering language into a form that can be reconstructed.</p>
    <a href="https://www.example.com">Visit Example</a>
    <!-- Blocks Section -->
    <div class="block-container">
        <h2>Block Elements</h2>
        <p>This is a block-level element containing an image.</p>
        <img src="photo1.jpg" height="300px" width="300px">
    </div>
    <!-- Float Section -->
    <div class="float-container">
        <h2>Float Property</h2>
        <p>This text wraps around the floated image.</p>
        <img src="photo2.jpg" height="300px" width="300px">
    </div>
</body>
</html>
